  <style>
  * { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #0a0a0a;
  }
  .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  
  /* Barber pole pattern background */
  .barber-bg {
    background: 
      radial-gradient(circle at 20% 10%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(234, 179, 8, 0.06) 0%, transparent 50%),
      linear-gradient(180deg, #0a0a0a 0%, #161616 100%);
  }
  
  .barber-stripes {
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(220, 38, 38, 0.03) 10px,
      rgba(220, 38, 38, 0.03) 20px
    );
  }
  
  /* Chat message animations */
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-dot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(220, 38, 38, 0.3), 0 0 40px rgba(220, 38, 38, 0.1); }
    50% { box-shadow: 0 0 30px rgba(220, 38, 38, 0.5), 0 0 60px rgba(220, 38, 38, 0.2); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes barber-spin {
    0% { background-position: 0 0; }
    100% { background-position: 0 40px; }
  }
  
  .msg-bot { animation: slideInLeft 0.4s ease-out; }
  .msg-user { animation: slideInRight 0.4s ease-out; }
  .btn-option { animation: fadeInUp 0.5s ease-out backwards; }
  
  .typing-dot {
    animation: pulse-dot 1.4s infinite ease-in-out both;
  }
  .typing-dot:nth-child(1) { animation-delay: -0.32s; }
  .typing-dot:nth-child(2) { animation-delay: -0.16s; }
  
  .cta-glow { animation: glow 2s ease-in-out infinite; }
  
  .shimmer-text {
    background: linear-gradient(
      90deg,
      #fbbf24 0%,
      #fef3c7 50%,
      #fbbf24 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  
  .barber-pole {
    background: repeating-linear-gradient(
      45deg,
      #dc2626 0px,
      #dc2626 8px,
      #ffffff 8px,
      #ffffff 16px,
      #1e3a8a 16px,
      #1e3a8a 24px,
      #ffffff 24px,
      #ffffff 32px
    );
    background-size: 40px 40px;
    animation: barber-spin 2s linear infinite;
  }
  
  /* Custom scrollbar */
  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-track { background: #1a1a1a; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
  .chat-scroll::-webkit-scrollbar-thumb:hover { background: #ef4444; }
  
  .option-btn {
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .option-btn:hover {
    transform: translateX(4px);
  }
  .option-btn:active {
    transform: scale(0.98);
  }
  
  .cta-btn {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  }
  .cta-btn:active {
    transform: translateY(0);
  }
  
  .avatar-badge {
    background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%);
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
  }
  
  .price-tag {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    box-shadow: 0 4px 20px rgba(251, 191, 36, 0.3);
  }
  
  .benefit-card {
    background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(20, 20, 20, 0.9) 100%);
    border: 1px solid rgba(220, 38, 38, 0.2);
    backdrop-filter: blur(10px);
  }
  
  .online-indicator {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
    animation: pulse-ring 1.5s infinite;
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
    70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }
</style>

 <body class="h-full w-full">

      <div class="flex items-center justify-center gap-3 mb-3">
       <div class="barber-pole w-2 h-12 rounded-full border-2 border-white/20"></div>

        </div>
        <div class="online-indicator absolute bottom-0 right-0 border-2 border-black"></div>
       </div>
       <div class="flex-1">
        <h2 class="text-white font-bold text-base md:text-lg">Isaac Arts</h2>
        <p class="text-green-400 text-xs flex items-center gap-1"><span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block"></span> Online agora • Responde em segundos</p>
       </div>
       <div class="hidden md:flex items-center gap-1 text-yellow-400"><i data-lucide="star" class="w-4 h-4 fill-current"></i> <i data-lucide="star" class="w-4 h-4 fill-current"></i> <i data-lucide="star" class="w-4 h-4 fill-current"></i> <i data-lucide="star" class="w-4 h-4 fill-current"></i> <i data-lucide="star" class="w-4 h-4 fill-current"></i>

  </main>
  <script>
  // Default configuration
  const defaultConfig = {
    agent_name: "ISAAC ARTS",
    agent_subtitle: "Seu Mentor em Barbeiro",
    welcome_message: "E aí, meu parceiro! 👋 Tudo bem? Sou o Isaac!",
    cta_button_text: "QUERO GARANTIR MINHA VAGA AGORA",
    cta_link: "https://kiwify.app/KfMi9ik?afid=KiBYsNLa"
  };

  // Conversation flow state
  const chatMessages = document.getElementById('chat-messages');
  const optionsArea = document.getElementById('options-area');
  let currentStep = 'start';

  // Get CTA link from config
  function getCtaLink() {
    return (window.elementSdk?.config?.cta_link) || defaultConfig.cta_link;
  }
  function getCtaText() {
    return (window.elementSdk?.config?.cta_button_text) || defaultConfig.cta_button_text;
  }

  // Add bot message
  function addBotMessage(text, delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        showTyping();
        setTimeout(() => {
          hideTyping();
          const msg = document.createElement('div');
          msg.className = 'msg-bot flex items-start gap-2 max-w-[90%]';
          msg.innerHTML = `
            <div class="avatar-badge w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-1 border border-red-500/30 overflow-hidden">
              <img src="https://imgur.com/RG0zWDN.jpg" alt="Isaac" class="w-full h-full object-cover" loading="lazy" onerror="this.style.background='#7f1d1d';"/>
            </div>
            <div class="bg-gradient-to-br from-neutral-800 to-neutral-900 text-white rounded-2xl rounded-tl-sm px-4 py-3 shadow-lg border border-red-900/20">
              <p class="text-sm md:text-base leading-relaxed">${text}</p>
            </div>
          `;
          chatMessages.appendChild(msg);
          lucide.createIcons();
          scrollToBottom();
          resolve();
        }, 900);
      }, delay);
    });
  }

  // Add user message (when they click an option)
  function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg-user flex justify-end';
    msg.innerHTML = `
      <div class="bg-gradient-to-br from-red-600 to-red-800 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 shadow-lg max-w-[85%]">
        <p class="text-sm md:text-base">${text}</p>
      </div>
    `;
    chatMessages.appendChild(msg);
    scrollToBottom();
  }

  // Typing indicator
  function showTyping() {
    const typing = document.createElement('div');
    typing.id = 'typing-indicator';
    typing.className = 'flex items-start gap-2';
    typing.innerHTML = `
      <div class="avatar-badge w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 border border-red-500/30 overflow-hidden">
        <img src="https://imgur.com/RG0zWDN.jpg" alt="Isaac" class="w-full h-full object-cover" loading="lazy" onerror="this.style.background='#7f1d1d';"/>
      </div>
      <div class="bg-neutral-800 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-1.5">
        <span class="typing-dot w-2 h-2 bg-red-400 rounded-full"></span>
        <span class="typing-dot w-2 h-2 bg-red-400 rounded-full"></span>
        <span class="typing-dot w-2 h-2 bg-red-400 rounded-full"></span>
      </div>
    `;
    chatMessages.appendChild(typing);
    lucide.createIcons();
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // Render options buttons
  function renderOptions(options) {
    optionsArea.innerHTML = '';
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn btn-option w-full text-left bg-gradient-to-r from-neutral-900 to-neutral-800 hover:from-red-900/40 hover:to-neutral-800 border border-red-900/30 hover:border-red-500 text-white rounded-xl px-4 py-3 flex items-center gap-3 group';
      btn.style.animationDelay = `${i * 0.08}s`;
      btn.innerHTML = `
        <span class="w-7 h-7 rounded-full bg-red-600/20 border border-red-500/50 flex items-center justify-center text-red-400 text-xs font-bold flex-shrink-0 group-hover:bg-red-600 group-hover:text-white transition-colors">${i + 1}</span>
        <span class="flex-1 text-sm md:text-base font-medium">${opt.label}</span>
        <i data-lucide="chevron-right" class="w-4 h-4 text-red-500 flex-shrink-0 group-hover:translate-x-1 transition-transform"></i>
      `;
      btn.addEventListener('click', () => {
        addUserMessage(opt.userText || opt.label);
        optionsArea.innerHTML = '';
        handleStep(opt.next);
      });
      optionsArea.appendChild(btn);
    });
    lucide.createIcons();
  }

  // Render CTA button (final conversion)
  function renderCTA(withSecondary = true) {
    optionsArea.innerHTML = '';
    
    const ctaWrap = document.createElement('div');
    ctaWrap.className = 'space-y-2';
    
    const cta = document.createElement('a');
    cta.href = getCtaLink();
    cta.target = '_blank';
    cta.rel = 'noopener noreferrer';
    cta.className = 'cta-btn cta-glow btn-option w-full text-white rounded-xl px-4 py-4 flex items-center justify-center gap-2 font-bold text-sm md:text-base uppercase tracking-wide shadow-xl no-underline';
    cta.innerHTML = `
      <i data-lucide="zap" class="w-5 h-5"></i>
      <span>${getCtaText()}</span>
      <i data-lucide="arrow-right" class="w-5 h-5"></i>
    `;
    ctaWrap.appendChild(cta);

    if (withSecondary) {
      const secondary = document.createElement('button');
      secondary.className = 'option-btn btn-option w-full text-left bg-neutral-900/50 hover:bg-neutral-800 border border-neutral-700 text-gray-300 rounded-xl px-4 py-2.5 flex items-center gap-2 text-sm';
      secondary.style.animationDelay = '0.15s';
      secondary.innerHTML = `
        <i data-lucide="message-circle-question" class="w-4 h-4 text-yellow-500"></i>
        <span>Ainda tenho uma dúvida</span>
      `;
      secondary.addEventListener('click', () => {
        addUserMessage('Ainda tenho uma dúvida');
        optionsArea.innerHTML = '';
        handleStep('doubts');
      });
      ctaWrap.appendChild(secondary);
    }
    
    const restart = document.createElement('button');
    restart.className = 'option-btn btn-option w-full text-center text-gray-500 hover:text-gray-300 text-xs py-1 flex items-center justify-center gap-1';
    restart.style.animationDelay = '0.25s';
    restart.innerHTML = `<i data-lucide="rotate-ccw" class="w-3 h-3"></i> Recomeçar a conversa`;
    restart.addEventListener('click', restart_conversation);
    ctaWrap.appendChild(restart);

    optionsArea.appendChild(ctaWrap);
    lucide.createIcons();
  }

  function restart_conversation() {
    chatMessages.innerHTML = '';
    optionsArea.innerHTML = '';
    startConversation();
  }

  // ====== CONVERSATION FLOW ======
  
  async function startConversation() {
    const welcome = (window.elementSdk?.config?.welcome_message) || defaultConfig.welcome_message;
    
    await addBotMessage(welcome);
    await addBotMessage("Tô aqui pra te mostrar como <strong class='text-yellow-400'>barbeiros profissionais estão transformando suas carreiras</strong> e construindo uma vida melhor. 💈✂️", 400);
    await addBotMessage("Antes de tudo, me conta uma coisa rapidinha... 👇", 400);
    
    renderOptions([
      { label: "Nunca cortei cabelo, sou iniciante total", userText: "Sou iniciante total", next: 'q1_iniciante' },
      { label: "Já corto, mas quero evoluir", userText: "Quero evoluir", next: 'q1_intermediario' },
      { label: "Já sou barbeiro, quero me profissionalizar", userText: "Quero me profissionalizar", next: 'q1_avancado' }
    ]);
  }

  // ====== PERGUNTA MATADORA 1: DOR ======
  
  async function handleStep(step) {
    currentStep = step;
    
    switch(step) {
      // === PERFIL INICIANTE ===
      case 'q1_iniciante':
        await addBotMessage("Perfeito! 🎯 Você está no lugar certo.");
        await addBotMessage("Deixa eu te fazer uma <strong>pergunta importante</strong>... 🤔", 400);
        await addBotMessage("<strong class='text-red-400'>Você quer aprender uma profissão que seja PROCURADA, com boa demanda de clientes e oportunidades reais?</strong>", 500);
        renderOptions([
          { label: "Sim! Quero uma profissão com demanda", userText: "Quero aprender uma profissão com demanda", next: 'q2_motivacao_iniciante' },
          { label: "Quero estruturar minha própria carreira", userText: "Quero minha própria carreira", next: 'q2_carreira' },
          { label: "Estou em busca de uma mudança", userText: "Quero uma mudança", next: 'q2_mudanca' }
        ]);
        break;

      case 'q1_intermediario':
        await addBotMessage("Show! 💪 Então você já conhece a profissão...");
        await addBotMessage("Sou o Isaac e já transformei mais de 3.000 barbeiros em profissionais muito mais técnicos e reconhecidos. Deixa eu te fazer uma pergunta sincera... 🤔", 400);
        await addBotMessage("<strong class='text-red-400'>Você sente que sua técnica limita seu crescimento profissional e acesso a clientes mais exigentes?</strong> ✂️", 500);
        renderOptions([
          { label: "Sim, quero dominar mais técnicas", userText: "Quero dominar mais técnicas", next: 'q2_tecnicas' },
          { label: "Quero me posicionar como profissional premium", userText: "Quero posicionamento premium", next: 'q2_posicionamento' },
          { label: "Quero empreender e ter minha barbearia", userText: "Quero empreender", next: 'q2_empreender' }
        ]);
        break;

      case 'q1_avancado':
        await addBotMessage("Excelente! 🔥 Então você já conhece o mercado...");
        await addBotMessage("Te pergunto uma coisa direta... 🤔", 400);
        await addBotMessage("<strong class='text-red-400'>Você quer dominar as técnicas AVANÇADAS que apenas 10% dos barbeiros do mercado conseguem executar com qualidade?</strong>", 500);
        renderOptions([
          { label: "Sim, quero ser um dos melhores", userText: "Quero ser top de mercado", next: 'q2_tecnicas' },
          { label: "Quero diferenciar meu trabalho", userText: "Quero me diferenciar", next: 'q2_diferenciacao' },
          { label: "Quero estruturar meu próprio negócio", userText: "Quero estruturar negócio", next: 'q2_empreender' }
        ]);
        break;

      // ====== PERGUNTA MATADORA 2: MOTIVAÇÃO E GATILHO ======

      case 'q2_motivacao_iniciante':
        await addBotMessage("Essa é a atitude certa! 💡");
        await addBotMessage("Barbeiro é uma profissão com ALTA demanda no mercado. Tem gente procurando por profissionais qualificados o tempo todo.", 500);
        await addBotMessage("Profissionais que dominam técnicas modernas — como degradê, navalhado, desenhos — são MUITO procurados e respeitados no mercado.", 500);
        await addBotMessage("Quer aprender do zero e se tornar um profissional qualificado? 🚀", 500);
        renderOptions([
          { label: "Sim! Me mostra como estruturar isso", userText: "Quero aprender tudo!", next: 'apresenta_curso' },
          { label: "Tenho uma dúvida antes", userText: "Tenho uma dúvida", next: 'doubts' }
        ]);
        break;

      case 'q2_carreira':
        await addBotMessage("Ótimo pensamento! 🎯");
        await addBotMessage("Uma carreira bem estruturada começa com o domínio técnico. Quando você sabe CORTAR BEM, as oportunidades aparecem naturalmente.", 500);
        await addBotMessage("Você pode trabalhar em barbearias reconhecidas, montar sua clientela própria, ou até abrir seu próprio negócio depois.", 500);
        await addBotMessage("Tudo começa aprendendo as técnicas certas! ✂️", 500);
        renderOptions([
          { label: "Perfeito! Quero começar", userText: "Vamos começar!", next: 'apresenta_curso' },
          { label: "Tenho mais dúvidas", userText: "Mais dúvidas", next: 'doubts' }
        ]);
        break;

      case 'q2_mudanca':
        await addBotMessage("Uma mudança bem planejada começa com escolher a profissão CERTA. 🎯");
        await addBotMessage("Barbeiro é uma profissão que oferece flexibilidade, reconhecimento e estabilidade de demanda — muito diferente de outras áreas.", 500);
        await addBotMessage("Muitos alunos fizeram essa transição e nunca mais olharam pra trás. Quer conhecer a estrutura completa que funciona? 💪", 500);
        renderOptions([
          { label: "Quero conhecer a estrutura", userText: "Quero a estrutura completa", next: 'apresenta_curso' },
          { label: "Qual o primeiro passo?", userText: "Qual é o primeiro passo?", next: 'apresenta_curso' }
        ]);
        break;

      case 'q2_tecnicas':
        await addBotMessage("Excelente decisão! 🔥");
        await addBotMessage("Quando você domina <strong>cortes degradê, navalhado, social moderno, desenhos e artes no cabelo</strong>, você se diferencia completamente dos demais profissionais.", 500);
        await addBotMessage("Clientes procuram especificamente por profissionais que executam essas técnicas com qualidade. É pura oferta e demanda de mercado! 📈", 500);
        await addBotMessage("Quer aprender tudo isso passo a passo? 🎓", 500);
        renderOptions([
          { label: "Quero dominar todas essas técnicas!", userText: "Quero dominar tudo!", next: 'apresenta_curso' },
          { label: "Em quanto tempo vou aprender?", userText: "Demora pra aprender?", next: 'objecao_tempo' }
        ]);
        break;

      case 'q2_posicionamento':

  // ===== Element SDK Integration =====
  function onConfigChange(config) {
    const title = document.getElementById('agent-title');
    const subtitle = document.getElementById('agent-subtitle');
    const name = config.agent_name || defaultConfig.agent_name;
    
    // Split name for styling (last word gets shimmer)
    const parts = name.split(' ');
    if (parts.length > 1) {
      const last = parts.pop();
      title.innerHTML = `${parts.join(' ')} <span class="shimmer-text">${last}</span>`;
    } else {
      title.innerHTML = `<span class="shimmer-text">${name}</span>`;
    }
    
    subtitle.textContent = config.agent_subtitle || defaultConfig.agent_subtitle;
  }

  // Initialize
  (async function init() {
    if (window.elementSdk) {
      await window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => onConfigChange(config),
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["agent_name", config.agent_name || defaultConfig.agent_name],
          ["agent_subtitle", config.agent_subtitle || defaultConfig.agent_subtitle],
          ["welcome_message", config.welcome_message || defaultConfig.welcome_message],
          ["cta_button_text", config.cta_button_text || defaultConfig.cta_button_text],
          ["cta_link", config.cta_link || defaultConfig.cta_link]
        ])
      });
    }
    
    lucide.createIcons();
    startConversation();
  })();
