<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbeiro Descomplicado</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .chat-bubble-bot { background: #1a1a2e; border-radius: 18px 18px 18px 4px; }
    .chat-bubble-user { background: #d4af37; border-radius: 18px 18px 4px 18px; color: #1a1a2e; }
    .option-btn { transition: all 0.2s; }
    .option-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
    .cta-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(212,175,55,0.4); } 50%{ box-shadow: 0 0 0 12px rgba(212,175,55,0); } }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-[#0f0f1a] text-white overflow-hidden">
  <div class="h-full flex flex-col w-full max-w-md mx-auto"><!-- Header -->
   <div class="flex items-center justify-center py-3 border-b border-[#d4af37]/20"><img src="https://imgur.com/q6vpVS9.png" alt="Barbeiro Descomplicado" class="h-12" loading="lazy" onerror="this.style.display='none';">
   </div><!-- Chat Area -->
   <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-3">
   </div><!-- Options Area -->
   <div id="options-container" class="p-4 space-y-2 border-t border-[#d4af37]/20">
   </div>
  </div>
  <script>
    const CTA_LINK = 'https://kiwify.app/KfMi9ik?afid=KiBYsNLa';
    const chatContainer = document.getElementById('chat-container');
    const optionsContainer = document.getElementById('options-container');

    const defaultConfig = {
      welcome_message: 'E aí, meu brother! 🔥',
      primary_color: '#d4af37',
      bg_color: '#0f0f1a',
      text_color: '#ffffff',
      surface_color: '#1a1a2e',
      font_family: 'DM Sans'
    };

    let config = { ...defaultConfig };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (c) => {
        config = c;
        document.body.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
      },
      mapToCapabilities: (c) => ({
        recolorables: [
          { get: () => c.bg_color || defaultConfig.bg_color, set: (v) => { c.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); document.body.style.backgroundColor = v; } },
          { get: () => c.surface_color || defaultConfig.surface_color, set: (v) => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => c.text_color || defaultConfig.text_color, set: (v) => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => c.primary_color || defaultConfig.primary_color, set: (v) => { c.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => c.font_family || defaultConfig.font_family, set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (c) => new Map([
        ['welcome_message', c.welcome_message || defaultConfig.welcome_message]
      ])
    });

    // Chat flow engine
    const flow = {
      start: {
        bot: () => `${config.welcome_message || defaultConfig.welcome_message}\n\nEu sou o assistente do curso **Barbeiro Descomplicado** ✂️\n\nMe conta: você já corta cabelo ou tá começando do zero?`,
        options: [
          { text: '🔰 Tô começando do zero', next: 'beginner' },
          { text: '💈 Já corto, quero evoluir', next: 'experienced' }
        ]
      },
      beginner: {
        bot: () => `Show! Então deixa eu te fazer uma pergunta importante:\n\n**Quanto dinheiro você tá deixando na mesa todo mês por não saber cortar cabelo profissionalmente?** 💰\n\nPensa comigo: um barbeiro cobra de R$30 a R$80 por corte. Com 5 clientes por dia, são mais de R$4.000/mês!\n\nO que te impede de começar hoje?`,
        options: [
          { text: '😰 Tenho medo de errar', next: 'fear' },
          { text: '💸 Não sei se vale o investimento', next: 'price' },
          { text: '🤔 Será que consigo aprender?', next: 'doubt' }
        ]
      },
      experienced: {
        bot: () => `Boa! Então me diz:\n\n**Seus clientes voltam toda semana pedindo por VOCÊ ou vão em qualquer barbeiro?** 🤔\n\nO curso Barbeiro Descomplicado ensina técnicas avançadas que fazem o cliente virar FÃ do seu trabalho.\n\nO que te faria dar o próximo passo?`,
        options: [
          { text: '📈 Quero cobrar mais caro', next: 'value' },
          { text: '💸 Tá caro pra mim agora', next: 'price' },
          { text: '🧐 O que tem de diferente?', next: 'different' }
        ]
      },
      fear: {
        bot: () => `Eu te entendo 100%! Mas olha só:\n\n✅ O curso vai do ZERO ao avançado, passo a passo\n✅ Você pratica com calma, no seu ritmo\n✅ E ainda tem **7 dias de garantia** — se não gostar, devolvem seu dinheiro!\n\nOu seja: o único risco é continuar parado enquanto outros estão faturando 💪\n\n**Por apenas 10x de R$15,26** (ou R$127 à vista) você muda de vida!\n\nBora garantir sua vaga?`,
        options: [
          { text: '🚀 QUERO COMEÇAR AGORA!', next: 'cta' },
          { text: '💸 Ainda acho caro...', next: 'price_final' }
        ]
      },
      doubt: {
        bot: () => `Brother, vou ser direto contigo:\n\nSe você sabe segurar uma máquina e uma tesoura, você CONSEGUE. 💯\n\nO método é descomplicado de verdade — do iniciante ao experiente. Milhares já aprenderam.\n\nE se em 7 dias você sentir que não é pra você? **Garantia total, dinheiro de volta.**\n\nSão apenas **10x de R$15,26** pra mudar sua história. Menos que um corte de cabelo por mês!\n\nE aí, vai ficar só olhando ou vai agir?`,
        options: [
          { text: '🚀 VOU AGIR! QUERO O CURSO!', next: 'cta' },
          { text: '🤔 Me conta mais sobre o curso', next: 'different' }
        ]
      },
      price: {
        bot: () => `Entendo a preocupação! Mas faz as contas comigo:\n\n💰 O curso custa **10x de R$15,26**\n💈 UM corte de cabelo já paga a parcela do mês\n📈 No primeiro mês você já recupera o investimento!\n\nÉ literalmente o investimento mais barato que vai te dar retorno REAL.\n\nE ainda tem **7 dias de garantia** — risco ZERO pra você.\n\nO que vale mais: guardar R$15 ou aprender a faturar R$4.000+/mês?`,
        options: [
          { text: '🚀 FAZ SENTIDO! QUERO!', next: 'cta' },
          { text: '😰 E se não gostar?', next: 'guarantee' }
        ]
      },
      value: {
        bot: () => `Exatamente! Quando você domina técnicas avançadas:\n\n🔥 Seus cortes ficam diferenciados\n🔥 Clientes pagam mais sem reclamar\n🔥 Você lota sua agenda por indicação\n\nO curso Barbeiro Descomplicado te leva a esse nível. E por **apenas 10x de R$15,26!**\n\n7 dias de garantia — se não evoluir, devolvem tudo.`,
        options: [
          { text: '🚀 QUERO EVOLUIR AGORA!', next: 'cta' },
          { text: '🧐 O que vou aprender?', next: 'different' }
        ]
      },
      different: {
        bot: () => `O **Barbeiro Descomplicado** é completo:\n\n✂️ Do iniciante ao avançado\n📚 Técnicas de degradê, navalha, barba, química\n💼 Como montar sua barbearia\n📱 Marketing pra lotar sua agenda\n🎓 Método passo a passo, sem enrolação\n\n**Tudo isso por 10x de R$15,26** (ou R$127 à vista)\n\n🛡️ 7 dias de garantia incondicional!\n\nPronto pra transformar sua vida?`,
        options: [
          { text: '🚀 SIM! QUERO MINHA VAGA!', next: 'cta' },
          { text: '💸 Ainda tô na dúvida...', next: 'price_final' }
        ]
      },
      guarantee: {
        bot: () => `Simples: você tem **7 dias de garantia TOTAL**! 🛡️\n\nSe por qualquer motivo não gostar, não aprender, ou simplesmente mudar de ideia — pede o reembolso e pronto. Sem perguntas.\n\nOu seja: ou você aprende e muda de vida, ou recebe seu dinheiro de volta. Dos dois jeitos você ganha!\n\nEntão... qual o motivo pra NÃO tentar?`,
        options: [
          { text: '🚀 NENHUM! QUERO O CURSO!', next: 'cta' },
          { text: '💰 Quanto custa mesmo?', next: 'price_final' }
        ]
      },
      price_final: {
        bot: () => `Olha o resumo:\n\n💳 **10x de R$15,26** no cartão\n💵 Ou **R$127 à vista**\n🛡️ **7 dias de garantia** total\n\nIsso é MENOS que um corte de cabelo por mês pra aprender a FATURAR com cortes de cabelo!\n\nDaqui 30 dias você pode estar cortando e ganhando dinheiro ou pode estar no mesmo lugar...\n\n**A escolha é sua!** 👇`,
        options: [
          { text: '🚀 QUERO MUDAR MINHA VIDA!', next: 'cta' },
          { text: '🔄 Tenho outra dúvida', next: 'start' }
        ]
      },
      cta: {
        bot: () => `🔥 **DECISÃO CERTA, BROTHER!** 🔥\n\nClica no botão abaixo pra garantir sua vaga no **Barbeiro Descomplicado** antes que o preço aumente!\n\n✂️ Do zero ao profissional\n💰 10x de R$15,26\n🛡️ 7 dias de garantia`,
        options: [],
        cta: true
      }
    };

    function addMessage(text, isBot) {
      const div = document.createElement('div');
      div.className = `fade-in ${isBot ? '' : 'flex justify-end'}`;
      const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      div.innerHTML = `<div class="${isBot ? 'chat-bubble-bot' : 'chat-bubble-user'} inline-block px-4 py-3 max-w-[85%] text-sm leading-relaxed">${formatted}</div>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showOptions(step) {
      optionsContainer.innerHTML = '';
      if (step.cta) {
        const a = document.createElement('a');
        a.href = CTA_LINK;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'cta-pulse block w-full text-center bg-[#d4af37] text-[#1a1a2e] font-bold py-4 rounded-xl text-lg option-btn';
        a.textContent = '✂️ GARANTIR MINHA VAGA AGORA!';
        optionsContainer.appendChild(a);
        return;
      }
      step.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn w-full text-left px-4 py-3 rounded-xl border border-[#d4af37]/40 text-sm font-medium hover:bg-[#d4af37]/10 transition';
        btn.textContent = opt.text;
        btn.onclick = () => {
          addMessage(opt.text, false);
          optionsContainer.innerHTML = '';
          setTimeout(() => goTo(opt.next), 600);
        };
        optionsContainer.appendChild(btn);
      });
    }

    function goTo(key) {
      const step = flow[key];
      addMessage(step.bot(), true);
      setTimeout(() => showOptions(step), 400);
    }

    // Start
    setTimeout(() => goTo('start'), 500);

    lucide.createIcons();
  </script>

</html>
